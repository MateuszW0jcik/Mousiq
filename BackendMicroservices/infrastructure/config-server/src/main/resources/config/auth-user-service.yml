server:
  port: 0

spring:
  application:
    name: auth-user-service

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/mousiq_auth_user_db}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

google:
  client-id: ${GOOGLE_CLIENT-ID:id}
  client-secret: ${GOOGLE_CLIENT-SECRET:secret}

admin:
  email: ${ADMIN_EMAIL:email}
  password: ${ADMIN_PASSWORD:password}