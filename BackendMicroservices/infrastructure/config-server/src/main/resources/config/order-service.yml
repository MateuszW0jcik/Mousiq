server:
  port: 0

spring:
  application:
    name: order-service

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/mousiq_order_db}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:29092}
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.example.orderservice.model.dto,org.example.paymentservice.model.dto,*"
        spring.json.use.type.headers: false