spring.application.name=Mousiq

server.port=${PORT:8080}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
refresh.expiration=${REFRESH_EXPIRATION}

admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

google.client-id=${GOOGLE_CLIENT-ID}
google.client-secret=${GOOGLE_CLIENT-SECRET}

stripe.secret-key:${STRIPE_SECRET-KEY}
stripe.webhook-secret:${STRIPE_WEBHOOK-SECRET}

spring.config.import=optional:file:.env[.properties]